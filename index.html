<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The End of All Things. Upcoming shows, newsletter, music, and band information."
    />
    <title>The End of All Things</title>
  </head>
  <body>
    <div id="app">
      <header class="site-header" aria-label="Primary">
        <nav class="site-nav">
          <a href="#shows">Shows</a>
          <a href="#music">Music</a>
          <a href="#about">About</a>
        </nav>
      </header>

      <main class="site-shell">
        <h1 class="sr-only">The End of All Things</h1>

        <section id="shows" class="panel panel-shows" aria-labelledby="shows-title">
          <div class="section-heading">
            <h2 id="shows-title">Next Shows</h2>
          </div>

          <article class="show-card">
            <p class="show-date">Thursday, August 27th</p>
            <p class="venue">Jupiter</p>
            <p class="time">6PM</p>
            <a class="text-link" href="https://www.jupiterwinthrop.com/music">More Info</a>
          </article>

          <section class="newsletter" aria-labelledby="newsletter-title">
            <div class="section-heading">
              <h2 id="newsletter-title">Newsletter</h2>
            </div>
            <p class="newsletter-copy">Sign up for updates on new music, shows, and more.</p>
            <form class="signup-form" aria-label="Newsletter signup">
              <label class="sr-only" for="email">Email address</label>
              <input id="email" name="email" type="email" placeholder="Email Address" autocomplete="email" />
              <button type="button">Sign Up</button>
            </form>
          </section>
        </section>

        <section id="music" class="panel panel-placeholder" aria-labelledby="music-title">
          <div class="section-heading">
            <h2 id="music-title">Music</h2>
          </div>
          <p>Coming soon.</p>
        </section>

        <section id="about" class="panel panel-placeholder" aria-labelledby="about-title">
          <div class="section-heading">
            <h2 id="about-title">About</h2>
          </div>
          <p>Coming soon.</p>
        </section>
      </main>

      <footer class="site-footer">
        <a
          class="instagram-link"
          href="https://www.instagram.com/the.end.of.all.things/"
          aria-label="The End of All Things on Instagram"
        >
          Instagram
        </a>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
